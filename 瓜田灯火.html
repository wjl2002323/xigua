<style>

  #pubrow{gap:10px}

  #notif:hover{background:rgba(20,10,7,.8)}
  body.mobile #notif{top:auto;bottom:170px;left:10px;right:10px;transform:none;text-align:center}
  body.mobile #titleTxt{font-size:15px;letter-spacing:7px}

  body.mobile #seal{width:26px;height:26px;font-size:14px}

  body.mobile #searchBox input{width:100%}

  #legendMini{display:none}

  body.mobile #legendMini .tri{font-size:9px;color:#9a7f76}
  body.mobile.legend-open #legend{display:block;left:10px;right:auto;bottom:auto;top:164px;width:196px}

<body>
<canvas id="map"></canvas>
<div id="labels"></div>
<div id="titlePlate" class="plate">
  <div id="seal">灯</div>
  <div><div id="titleTxt">瓜田灯火</div><div id="subTxt"></div></div>
</div>
<div id="searchBox" class="plate"><span style="color:#8a6e68;font-size:12px">◎</span><input id="searchIn" placeholder="定位一个产地…麒麟 / 8424 / 中卫"></div>
<div id="legend" class="plate">
  <div class="hd">供需图例（点击只看该类）</div>
  <div class="row" data-f="supply"><span class="sw" style="background:#5ce8b2;box-shadow:0 0 6px #5ce8b2"></span>供给 · 瓜农<span class="num" id="nS"></span></div>
  <div class="row" data-f="individual"><span class="sw" style="background:#ffb454"></span>需求 · 个人<span class="num" id="nI"></span></div>
  <div class="row" data-f="store"><span class="sw" style="background:#ff9838"></span>需求 · 水果店<span class="num" id="nT"></span></div>
  <div class="row" data-f="factory"><span class="sw" style="background:#ff7d2e"></span>需求 · 工厂<span class="num" id="nF"></span></div>
  <div class="div"></div>
  <div class="row" style="cursor:default"><span class="sw" style="background:rgba(92,232,178,.35)"></span>潜在匹配线<span class="num" id="nL"></span></div>
  <div class="row" style="cursor:default"><span class="sw" style="background:#d6fff0;box-shadow:0 0 8px #8ff2cc"></span>已点亮 · 成交<span class="num" id="nD"></span></div>
</div>
<div id="legendMini" class="plate"><span class="tri">▸</span><span id="lgMiniTxt"></span></div>
<div id="caption"></div>
<div id="chips" class="plate">
  <div class="chiprow"><span class="chiplab">分类</span>
    <span class="chip on" data-t="all">全部</span><span class="chip" data-t="supply">瓜农</span><span class="chip" data-t="individual">个人</span><span class="chip" data-t="store">水果店</span><span class="chip" data-t="factory">工厂</span>
  </div>
  <div class="chiprow" id="pubrow">
    <a class="pubbtn sell" href="发布.html?mode=sell">🍉 我要卖瓜</a>
    <a class="pubbtn buy" href="发布.html?mode=buy">🛒 我要收瓜</a>
  </div>
  <div class="chiprow"><span class="chiplab">视图</span>
    <span class="chip on" data-m="potential">潜在匹配</span><span class="chip" data-m="deals">已成交</span><span class="chip" data-m="urgency">紧迫度</span><span class="vdiv"></span><span class="chip" data-m="plain">平面</span>
  </div>
</div>
<div id="card" class="plate"><span id="cardX">✕</span><div id="cardBody"></div>
  <div class="btns"><button id="btnCall">拨打电话</button><button id="btnDeal">标记已成交</button></div>
</div>
<div id="toast" class="plate"></div>
<div id="notif" class="plate"></div>
<div id="hint">拖动平移 · 滚轮缩放 · 点击光点看详情</div>
<script src="mock-data.js"></script>
<script src="config.js"></script>
<script src="gt-api.js"></script>
<script>
const D = window.GTDATA;
// 用户发布（GTAPI 数据层：local 模式=localStorage，行为与之前一致；supabase 模式见 gt-api.js）
function mergePosts(posts) {
  posts.forEach(p => {
    if (!p || !p.lon || !p.lat || D.sIndex[p.id] || D.dIndex[p.id]) return;
    if (p.kind === 'supply') {
      const s = { id: p.id, kind: 'supply', city: p.city, lon: p.lon, lat: p.lat, name: p.name, variety: p.variety || '麒麟', tons: +p.tons || 1, daysLeft: p.daysLeft || 7, phone: p.phone, priceWish: p.priceWish || null, mine: true };
      D.supplies.push(s); D.sIndex[s.id] = s;
      const cands = D.demands.map(d => ({ d, km: D.distKm(s, d) })).filter(x => x.km <= x.d.radiusKm).sort((a, b) => a.km - b.km).slice(0, 4);
      cands.forEach(({ d, km }) => D.links.push({ s: s.id, d: d.id, km: Math.round(km), deal: false }));
    } else {
      const d = { id: p.id, kind: 'demand', type: p.type || 'individual', city: p.city, lon: p.lon, lat: p.lat, name: p.name, tons: +p.tons || 1, radiusKm: p.radiusKm || 60, phone: p.phone, mine: true };
      D.demands.push(d); D.dIndex[d.id] = d;
      const cap = d.type === 'factory' ? 6 : d.type === 'store' ? 4 : 2;
      const cands = D.supplies.map(s => ({ s, km: D.distKm(d, s) })).filter(x => x.km <= d.radiusKm).sort((a, b) => a.km - b.km).slice(0, cap);
      cands.forEach(({ s, km }) => D.links.push({ s: s.id, d: d.id, km: Math.round(km), deal: false }));
    }
  });
}
try {
  GTAPI.ready.then(() => GTAPI.loadPosts()).then(posts => {
    if (!posts || !posts.length) return;
    mergePosts(posts);
    scoreAllLinks();
    checkMyMatches();
    if (proj) { // 若投影已就绪（云端异步晚到），补算屏幕坐标并刷新
      D.supplies.concat(D.demands).forEach(p => { if (!p.xy) p.xy = proj([p.lon, p.lat]); });
      refreshStats(); seedComets();
    }
  }).catch(() => {});
} catch (e) { /* GTAPI 未就绪则忽略，页面按无用户发布数据渲染 */ }
const mobileParam = new URLSearchParams(location.search).has('mobile');
const mobileMQ = matchMedia('(max-width: 640px)');
const isMobile = () => mobileParam || mobileMQ.matches;
const applyMobileClass = () => document.body.classList.toggle('mobile', isMobile());
mobileMQ.addEventListener('change', applyMobileClass);
const RM = matchMedia('(prefers-reduced-motion: reduce)').matches;
applyMobileClass();
const cv = document.getElementById('map'), ctx = cv.getContext('2d');
let W, H, dpr = Math.min(devicePixelRatio || 1, 2);
let landFeats = null, provFeats = null, proj = null, tf = d3.zoomIdentity;
let mode = 'potential', typeF = 'all', selected = null, t0 = performance.now(), selT = 0;
let stars, fog, fogScale;

function resize() {
  W = innerWidth; H = innerHeight;
  applyMobileClass();
  cv.width = W * dpr; cv.height = H * dpr;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  stars = document.createElement('canvas'); stars.width = W; stars.height = H;
  const sc = stars.getContext('2d');
  for (let i = 0; i < 160; i++) { sc.fillStyle = `rgba(255,235,220,${Math.random() * .16})`; sc.fillRect(Math.random() * W, Math.random() * H, 1, 1); }
  fog = document.createElement('canvas'); fog.width = Math.ceil(W / 3); fog.height = Math.ceil(H / 3); fogScale = fog.width / W;
  if (landFeats) { fitProjection(); if (!userMoved) focusHome(); }
}
function fitProjection() {
  proj = d3.geoMercator().fitExtent([[W * .06, H * .09], [W * .94, H * .95]], { type: 'FeatureCollection', features: landFeats });
  D.supplies.concat(D.demands).forEach(p => p.xy = proj([p.lon, p.lat]));
  D.labelCities.forEach(p => p.xy = proj([p.lon, p.lat]));
}
addEventListener('resize', resize); resize();

fetch('vendor/countries-50m.json').then(r => r.json()).then(topo => {
  const all = topojson.feature(topo, topo.objects.countries).features;
  landFeats = all.filter(f => f.id === '156' || f.id === '158');
  fitProjection();
  focusHome();
  requestAnimationFrame(frame);
}).catch(() => {
  document.getElementById('caption').textContent = '地图数据加载失败 · 请刷新重试';
  document.getElementById('subTxt').textContent = '本地地图数据缺失（vendor/countries-50m.json）';
});
// 省级轮廓（阿里 DataV GeoAtlas，失败则仅显示国界）
fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json').then(r => r.json())
  .then(g => { provFeats = g.features; }).catch(() => {});

let userMoved = false;
const zoom = d3.zoom().scaleExtent([0.75, 9]).on('zoom', e => { tf = e.transform; if (e.sourceEvent) userMoved = true; });
// 初始镜头：聚焦黄淮海产区（resize 后若用户未手动移动过则重新归位）
function focusHome() {
  const c = proj([115.5, 34.6]), k = isMobile() ? 1.9 : 2.1;
  tf = d3.zoomIdentity.translate(W / 2 - c[0] * k, H / 2 - c[1] * k).scale(k);
  d3.select(cv).call(zoom.transform, tf);
}
d3.select(cv).call(zoom);

function sx(p) { return tf.applyX(p.xy[0]); }
function sy(p) { return tf.applyY(p.xy[1]); }
function demandVisible(d) { return typeF === 'all' || typeF === d.type; }
function linkVisible(l) {
  if (typeF === 'supply') return false;
  const d = D.dIndex[l.d];
  if (!demandVisible(d)) return false;
  if (mode === 'deals') return l.deal;
  if (mode === 'potential') return true;
  return false;
}
function urgColor(days) { return days <= 3 ? '#ff4b3e' : days <= 7 ? '#ffb454' : '#5ce8b2'; }

// 匹配打分（确定性 $0，与 supabase/schema.sql 预留的 links.score 同公式；V2-R4）
function matchScore(s, d, km) {
  const dist = Math.max(0, 1 - km / d.radiusKm);              // 距离：半径内线性衰减
  const fit = Math.min(1, s.tons / Math.max(d.tons, 0.01));   // 量级：这片田能不能喂饱这单
  let sc = dist * .6 + fit * .4;
  if (s.daysLeft <= 3) sc = Math.min(1, sc * 1.15);           // 临期助推：帮瓜先出手
  return sc;
}
function matchReasons(s, d, km) {
  const r = [];
  if (km <= d.radiusKm * .35) r.push('离得近');
  if (s.tons >= d.tons) r.push('量够'); else if (s.tons >= d.tons * .5) r.push('量接近');
  if (s.daysLeft <= 3) r.push('赶时间');
  return r.length ? r : ['在收货范围内'];
}
function scoreAllLinks() {
  D.links.forEach(l => { const s = D.sIndex[l.s], d = D.dIndex[l.d]; if (s && d) l.score = matchScore(s, d, l.km); });
}
scoreAllLinks();

// 流光粒子
const comets = [];
function seedComets() {
  comets.length = 0;
  if (RM) return;
  const pool = D.links.filter(linkVisible);
  for (let i = 0; i < Math.min(46, pool.length); i++)
    comets.push({ l: pool[Math.floor(Math.random() * pool.length)], t: Math.random(), v: .0016 + Math.random() * .003 });
}
function qpoint(x1, y1, cx, cy, x2, y2, t) {
  const a = 1 - t;
  return [a * a * x1 + 2 * a * t * cx + t * t * x2, a * a * y1 + 2 * a * t * cy + t * t * y2];
}

function frame(now) {
  const tm = (now - t0) / 1000;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#050203'; ctx.fillRect(0, 0, W, H);
  ctx.drawImage(stars, 0, 0);
  // 地图
  ctx.save();
  ctx.translate(tf.x, tf.y); ctx.scale(tf.k, tf.k);
  const path = d3.geoPath(proj, ctx);
  ctx.beginPath(); landFeats.forEach(f => path(f));
  ctx.fillStyle = mode === 'plain' ? '#1c0b0c' : '#170608'; ctx.fill();
  if (provFeats) {
    ctx.beginPath(); provFeats.forEach(f => path(f));
    ctx.lineWidth = .6 / tf.k; ctx.strokeStyle = 'rgba(255,96,108,.13)'; ctx.stroke();
  }
  [[10, .04], [4, .1], [1.6, .32], [.8, .7]].forEach(([w, a]) => {
    ctx.beginPath(); landFeats.forEach(f => path(f));
    ctx.lineWidth = w / tf.k; ctx.strokeStyle = `rgba(232,58,72,${a})`; ctx.stroke();
  });
  ctx.restore();

  const selLinks = selected ? D.links.filter(l => l.s === selected.id || l.d === selected.id) : null;
  const inSel = p => selected && (p.id === selected.id || selLinks.some(l => l.s === p.id || l.d === p.id));

  // 连线：低分辨光雾层 + 锐线层；选中点喷泉式高弧 + 生长动画
  if (mode === 'potential' || mode === 'deals') {
    const wk = .55 + Math.sqrt(tf.k) * .45;
    const fc = fog.getContext('2d');
    fc.setTransform(fogScale, 0, 0, fogScale, 0, 0);
    fc.clearRect(0, 0, W, H);
    fc.globalCompositeOperation = 'lighter'; fc.lineCap = 'round';
    ctx.globalCompositeOperation = 'lighter';
    const grow = selected ? 1 - Math.pow(1 - Math.min(1, (tm - selT) / .9), 3) : 1;
    D.links.forEach(l => {
      if (!linkVisible(l)) return;
      const s = D.sIndex[l.s], d = D.dIndex[l.d];
      const x1 = sx(s), y1 = sy(s), x2 = sx(d), y2 = sy(d);
      if (Math.max(x1, x2) < -50 || Math.min(x1, x2) > W + 50) return;
      const isSel = selected && (l.s === selected.id || l.d === selected.id);
      const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
      const dx = x2 - x1, dy = y2 - y1, len = Math.hypot(dx, dy) || 1;
      let cx, cy;
      if (isSel) { const lift = Math.min(H * .42, 90 + len * .75); cx = mx - dy * .1; cy = Math.min(y1, y2) - lift; }
      else { const lift = 18 + len * .45; cx = mx - dy * .18; cy = my + dx * .18 - lift; }
      const fade = selected && !isSel ? .16 : 1;
      fc.strokeStyle = isSel ? `rgba(190,255,228,${.4})` : l.deal ? `rgba(170,255,220,${.3 * fade})` : `rgba(96,235,180,${.17 * fade})`;
      fc.lineWidth = (isSel ? 4 : l.deal ? 3.4 : 2.6) * wk;
      fc.beginPath(); fc.moveTo(x1, y1); fc.quadraticCurveTo(cx, cy, x2, y2); fc.stroke();
      const core = (a, w, col, p) => {
        ctx.strokeStyle = `rgba(${col},${a})`; ctx.lineWidth = w * wk;
        ctx.beginPath();
        if (p >= 1) { ctx.moveTo(x1, y1); ctx.quadraticCurveTo(cx, cy, x2, y2); }
        else {
          const fromSel = l.s === (selected && selected.id);
          ctx.moveTo(...qpoint(x1, y1, cx, cy, x2, y2, fromSel ? 0 : 1));
          for (let i = 1; i <= 24; i++) {
            const t = fromSel ? (i / 24) * p : 1 - (i / 24) * p;
            ctx.lineTo(...qpoint(x1, y1, cx, cy, x2, y2, t));
          }
        }
        ctx.stroke();
      };
      if (isSel) core(.9, 1.4, '240,255,248', grow);
      else if (l.deal) core(.85 * fade, 1.3, '224,255,242', 1);
      else core(.16 * fade, .8, '110,236,185', 1);
      l._c = [x1, y1, cx, cy, x2, y2];
    });
    // 流光
    comets.forEach(c => {
      c.t += c.v; if (c.t > 1) { c.t = 0; }
      const g = c.l._c; if (!g || !linkVisible(c.l)) return;
      const [px, py] = qpoint(...g, c.t);
      const grad = ctx.createRadialGradient(px, py, 0, px, py, 5);
      grad.addColorStop(0, c.l.deal ? 'rgba(230,255,245,.9)' : 'rgba(140,240,195,.7)');
      grad.addColorStop(1, 'rgba(140,240,195,0)');
      ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(px, py, 5, 0, 7); ctx.fill();
    });
    // 光雾合成（低分辨上采样自然柔化）
    ctx.globalAlpha = .8;
    ctx.drawImage(fog, 0, 0, W, H);
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
  }

  // 点位
  ctx.globalCompositeOperation = 'lighter';
  const drawPt = (p, col, r, glow) => {
    const x = sx(p), y = sy(p);
    if (x < -20 || x > W + 20 || y < -20 || y > H + 20) return;
    let al = 1;
    if (selected && !inSel(p)) al = .18;
    if (glow) {
      const g = ctx.createRadialGradient(x, y, 0, x, y, r * 1.7);
      g.addColorStop(0, col + (al * .3) + ')'); g.addColorStop(1, col + '0)');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r * 1.7, 0, 7); ctx.fill();
    }
    ctx.fillStyle = col + al + ')'; ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
  };
  const kk = Math.sqrt(tf.k) * (mode === 'plain' ? .7 : 1);
  D.supplies.forEach(s => {
    let col = 'rgba(92,232,178,', r = Math.min(6.5, 1.2 + Math.sqrt(s.tons) * .34) * kk;
    if (mode === 'urgency') {
      const c = urgColor(s.daysLeft);
      col = c === '#ff4b3e' ? 'rgba(255,75,62,' : c === '#ffb454' ? 'rgba(255,180,84,' : 'rgba(92,232,178,';
      if (s.daysLeft <= 3 && !RM) r *= 1 + .28 * Math.sin(tm * 5 + s.xy[0]);
    }
    drawPt(s, col, r, mode !== 'plain');
  });
  if (typeF !== 'supply') D.demands.forEach(d => {
    if (!demandVisible(d)) return;
    const col = d.type === 'individual' ? 'rgba(255,180,84,' : d.type === 'store' ? 'rgba(255,152,56,' : 'rgba(255,125,46,';
    drawPt(d, col, Math.min(6, 1 + Math.sqrt(Math.min(d.tons, 120)) * .3) * kk, mode !== 'plain');
  });
  ctx.globalCompositeOperation = 'source-over';
  if (selected) {
    const x = sx(selected), y = sy(selected);
    ctx.globalCompositeOperation = 'lighter';
    if (!RM) for (let i = 0; i < 2; i++) { // 辐射波纹
      const p = ((tm - selT) * .55 + i * .5) % 1;
      ctx.strokeStyle = `rgba(240,255,248,${.45 * (1 - p)})`; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(x, y, 10 + p * 64, 0, 7); ctx.stroke();
    }
    const bg = ctx.createRadialGradient(x, y, 0, x, y, 26); // 底部光晕
    bg.addColorStop(0, 'rgba(235,255,246,.5)'); bg.addColorStop(1, 'rgba(235,255,246,0)');
    ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(x, y, 26, 0, 7); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = 'rgba(255,236,200,.9)'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.arc(x, y, 8, 0, 7); ctx.stroke();
  }
  // 城市标签（贪心碰撞剔除）
  const placed = [];
  D.labelCities.forEach(c => {
    const el = c._el; if (!el) return;
    const x = tf.applyX(c.xy[0]), y = tf.applyY(c.xy[1]);
    if (x < -40 || x > W + 40 || y < 60 || y > H - 40) { el.style.display = 'none'; return; }
    if (y > H - 185 || (x < 245 && y > H - 360)) { el.style.display = 'none'; return; } // 避开字幕/图例/筛选条
    const h = c.name.length * 12 + 16, w = 24;
    const rect = [x - w / 2 - 4, y - h / 2 - 4, x + w / 2 + 4, y + h / 2 + 4];
    if (placed.some(r => rect[0] < r[2] && rect[2] > r[0] && rect[1] < r[3] && rect[3] > r[1])) { el.style.display = 'none'; return; }
    placed.push(rect);
    el.style.left = x + 'px'; el.style.top = y + 'px'; el.style.display = 'block';
  });
  requestAnimationFrame(frame);
}

// 城市标签 DOM
const labWrap = document.getElementById('labels');
D.labelCities.forEach(c => {
  const el = document.createElement('div'); el.className = 'citylab'; el.textContent = c.name; el.style.display = 'none';
  labWrap.appendChild(el); c._el = el;
});

// 统计 & 文案
const CT = { individual: '个人', store: '水果店', factory: '工厂' };
function refreshStats() {
  const nS = D.supplies.length, nI = D.demands.filter(d => d.type === 'individual').length,
    nT = D.demands.filter(d => d.type === 'store').length, nF = D.demands.filter(d => d.type === 'factory').length,
    nL = D.links.length, nD = D.links.filter(l => l.deal).length;
  const dealTons = D.links.filter(l => l.deal).reduce((a, l) => a + Math.min(D.sIndex[l.s].tons, D.dIndex[l.d].tons), 0);
  const urg = D.supplies.filter(s => s.daysLeft <= 3).length;
  document.getElementById('nS').textContent = nS; document.getElementById('nI').textContent = nI;
  document.getElementById('nT').textContent = nT; document.getElementById('nF').textContent = nF;
  document.getElementById('nL').textContent = nL; document.getElementById('nD').textContent = nD;
  document.getElementById('lgMiniTxt').textContent = `${nS} 供给 · ${nI + nT + nF} 需求 · ${nD} 成交`;
  const inFilter = l => typeF !== 'supply' && demandVisible(D.dIndex[l.d]);
  const fL = typeF === 'all' ? nL : D.links.filter(inFilter).length;
  const fDeals = typeF === 'all' ? D.links.filter(l => l.deal) : D.links.filter(l => l.deal && inFilter(l));
  const fD = fDeals.length;
  const fTons = fDeals.reduce((a, l) => a + Math.min(D.sIndex[l.s].tons, D.dIndex[l.d].tons), 0);
  const pre = typeF === 'all' || typeF === 'supply' ? '' : `只看${CT[typeF]} · `;
  const supplyCap = `只看瓜农 · ${nS} 片瓜田在售`;
  const cap = {
    potential: typeF === 'supply' ? supplyCap : `${pre}${fL.toLocaleString()} 条潜在连线，等待被点亮`,
    deals: typeF === 'supply' ? supplyCap : `${pre}${fD} 盏灯已点亮 · 约 ${Math.round(fTons).toLocaleString()} 吨西瓜找到归宿`,
    urgency: `${urg} 片瓜田，只剩不到 3 天窗口`,
    plain: `全国 ${nS} 片瓜田 · ${nI + nT + nF} 处需求`
  };
  document.getElementById('caption').textContent = cap[mode];
  document.getElementById('subTxt').textContent = selected
    ? `${selected.name} · ${selected.city} · 潜在匹配 ${D.links.filter(l => l.s === selected.id || l.d === selected.id).length} 处`
    : `全国 · 潜在连线 ${nL.toLocaleString()} 条 · 已点亮 ${nD} 条`;
}

// 详情卡
const card = document.getElementById('card'), cardBody = document.getElementById('cardBody');
function openCard(p) {
  selected = p; selT = (performance.now() - t0) / 1000;
  const my = D.links.filter(l => l.s === p.id || l.d === p.id);
  const near = my.length ? Math.min(...my.map(l => l.km)) : null;
  let html;
  if (p.kind === 'supply') {
    html = `<h3>${p.name}</h3><div class="tag">${p.city} · ${p.variety}西瓜 · 供给</div>
      <div class="kv"><span>可供量</span><b>${p.tons} 吨</b></div>
      <div class="kv ${p.daysLeft <= 3 ? 'urgent' : ''}"><span>售卖窗口</span><b>剩 ${p.daysLeft} 天</b></div>
      <div class="kv"><span>期望价</span><b>${p.priceWish ? p.priceWish + ' 元/斤' : '面议'}</b></div>
      <div class="kv"><span>潜在买家</span><b>${my.length} 处${near ? ' · 最近 ' + near + ' km' : ''}</b></div>
      <div class="kv"><span>联系电话</span><b>${p.phone}</b></div>`;
  } else {
    html = `<h3>${p.name}</h3><div class="tag">${p.city} · ${CT[p.type]} · 需求</div>
      <div class="kv"><span>需求量</span><b>${p.tons} 吨</b></div>
      <div class="kv"><span>收货半径</span><b>${p.radiusKm} km</b></div>
      <div class="kv"><span>潜在货源</span><b>${my.length} 处${near ? ' · 最近 ' + near + ' km' : ''}</b></div>
      <div class="kv"><span>联系电话</span><b>${p.phone}</b></div>`;
  }
  const ranked = my.map(l => {
    const other = p.kind === 'supply' ? D.dIndex[l.d] : D.sIndex[l.s];
    const s = p.kind === 'supply' ? p : D.sIndex[l.s];
    const d = p.kind === 'supply' ? D.dIndex[l.d] : p;
    return { other, km: l.km, score: l.score != null ? l.score : matchScore(s, d, l.km), reasons: matchReasons(s, d, l.km) };
  }).filter(x => x.other).sort((a, b) => b.score - a.score).slice(0, 3);
  if (ranked.length) {
    html += `<div class="mhd">匹配推荐</div>` + ranked.map(x => {
      const pct = Math.round(x.score * 100);
      const col = pct >= 70 ? '#5ce8b2' : pct >= 40 ? '#ffb454' : '#9a7f76';
      return `<div class="mrow" data-mid="${x.other.id}"><span class="mn">${x.other.name}</span><span class="mr">${x.km}km · ${x.reasons.join('·')}</span><span class="mp" style="color:${col}">${pct}%</span></div>`;
    }).join('');
  }
  cardBody.innerHTML = html;
  cardBody.querySelectorAll('.mrow').forEach(el => el.onclick = () => {
    const t = D.sIndex[el.dataset.mid] || D.dIndex[el.dataset.mid];
    if (t) openCard(t);
  });
  card.classList.add('show'); refreshStats();
}
document.getElementById('cardX').onclick = () => { selected = null; card.classList.remove('show'); refreshStats(); };
document.getElementById('legendMini').onclick = () => {
  const open = document.body.classList.toggle('legend-open');
  document.querySelector('#legendMini .tri').textContent = open ? '▾' : '▸';
};
document.getElementById('btnCall').onclick = () => {
  if (!selected) return;
  const num = String(selected.phone);
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(num).then(() => toast('已复制号码，请用手机拨打'), () => toast('号码：' + num));
  else toast('号码：' + num);
};
document.getElementById('btnDeal').onclick = () => {
  if (!selected) return;
  const my = D.links.filter(l => (l.s === selected.id || l.d === selected.id) && !l.deal).sort((a, b) => a.km - b.km);
  if (my[0]) { my[0].deal = true; my[0].dealAt = new Date().toISOString(); toast('已点亮一盏灯'); } else toast('该点位暂无可标记的连线');
  refreshStats();
};
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block';
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.style.display = 'none', 1800);
}

// 点击命中
cv.addEventListener('click', e => {
  const r = cv.getBoundingClientRect(), mx = e.clientX - r.left, my = e.clientY - r.top;
  let best = null, bd = 14;
  const test = p => { const d = Math.hypot(sx(p) - mx, sy(p) - my); if (d < bd) { bd = d; best = p; } };
  D.supplies.forEach(test);
  if (typeF !== 'supply') D.demands.forEach(d => demandVisible(d) && test(d));
  if (best) openCard(best); else { selected = null; card.classList.remove('show'); refreshStats(); }
});

// chips
document.querySelectorAll('.chip[data-t]').forEach(c => c.onclick = () => {
  document.querySelectorAll('.chip[data-t]').forEach(x => x.classList.remove('on'));
  c.classList.add('on'); typeF = c.dataset.t; seedComets(); refreshStats();
});
document.querySelectorAll('.chip[data-m]').forEach(c => c.onclick = () => {
  document.querySelectorAll('.chip[data-m]').forEach(x => x.classList.remove('on'));
  c.classList.add('on'); mode = c.dataset.m; seedComets(); refreshStats();
});
document.querySelectorAll('#legend .row[data-f]').forEach(rw => rw.onclick = () => {
  const f = rw.dataset.f;
  document.querySelector(`.chip[data-t="${f}"]`)?.click();
  document.querySelectorAll('#legend .row').forEach(x => x.classList.remove('on')); rw.classList.add('on');
});

// 搜索
document.getElementById('searchIn').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const q = e.target.value.trim(); if (!q) return;
  const hit = D.supplies.find(s => s.city.includes(q) || s.variety.includes(q) || s.name.includes(q))
    || D.demands.find(d => d.city.includes(q) || d.name.includes(q));
  if (!hit) { toast('未找到「' + q + '」'); return; }
  const k = 4.2, c = hit.xy;
  d3.select(cv).transition().duration(900)
    .call(zoom.transform, d3.zoomIdentity.translate(W / 2 - c[0] * k, H / 2 - c[1] * k).scale(k));
  openCard(hit);
});

setTimeout(seedComets, 800);
refreshStats();
if (new URLSearchParams(location.search).has('posted')) setTimeout(() => toast('你的灯已点亮 · 电话就是你的门牌'), 600);
// 站内新匹配通知（V2-R5；数据层无关 —— 云端接通后同套逻辑生效）
function checkMyMatches() {
  const mine = D.supplies.filter(s => s.mine).concat(D.demands.filter(d => d.mine));
  if (!mine.length) return;
  const myLinks = D.links.filter(l => (D.sIndex[l.s] && D.sIndex[l.s].mine) || (D.dIndex[l.d] && D.dIndex[l.d].mine));
  if (!myLinks.length) return;
  let seen;
  try { seen = new Set(JSON.parse(localStorage.getItem('GT_SEEN_MATCHES') || '[]')); } catch (e) { seen = new Set(); }
  const fresh = myLinks.filter(l => !seen.has(l.s + ':' + l.d));
  if (!fresh.length) return;
  const counts = {};
  fresh.forEach(l => { const k = (D.sIndex[l.s] && D.sIndex[l.s].mine) ? l.s : l.d; counts[k] = (counts[k] || 0) + 1; });
  const topId = Object.keys(counts).sort((a, b) => counts[b] - counts[a])[0];
  const n = document.getElementById('notif');
  n.textContent = `🏮 你有 ${fresh.length} 个新匹配 · 点我看`;
  const delay = new URLSearchParams(location.search).has('posted') ? 2600 : 900;
  setTimeout(() => { n.style.display = 'block'; }, delay);
  n.onclick = () => {
    localStorage.setItem('GT_SEEN_MATCHES', JSON.stringify(myLinks.map(l => l.s + ':' + l.d)));
    n.style.display = 'none';
    const t = D.sIndex[topId] || D.dIndex[topId];
    if (t) openCard(t);
  };
}
